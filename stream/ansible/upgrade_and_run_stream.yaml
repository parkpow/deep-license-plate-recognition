---
- name: Upgrade Stream container image and restart
  hosts: all
  become: yes

  tasks:

    - name: Deploy .env with secrets
      template:
        src: templates/.env.j2
        dest: "{{ stream_dir }}/.env"
        mode: '0600'
        owner: root
        group: root

    - name: Deploy docker-compose.yml with target version
      template:
        src: templates/docker-compose.yml.j2
        dest: "{{ compose_file_path }}"
        mode: '0644'

    - name: Pull image and recreate container if changed
      community.docker.docker_compose_v2:
        project_src: "{{ stream_dir }}"
        pull: always

# ansible-playbook upgrade_and_run_stream.yaml --limit serverX,serverY -e stream_version=VERSION_TAG_HERE
# leave -e stream_version empty to use the latest version from group_vars
